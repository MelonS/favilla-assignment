name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core 3.1
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'

      - name: Restore
        run: dotnet restore MTM.sln

      - name: Build
        run: dotnet build MTM.sln -c Release --no-restore

      - name: Test
        run: dotnet test MTM.sln -c Release --no-build --verbosity normal

      - name: Run simulation (smoke)
        run: dotnet run -c Release --no-build --project src/MTM.Simulation/MTM.Simulation.csproj
