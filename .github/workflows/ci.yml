name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # .NET Core 3.1 런타임은 OpenSSL 1.x 의존 → 최신 ubuntu(OpenSSL 3.x)에선 테스트 호스트가 크래시.
    # Windows 러너는 SChannel을 써서 libssl 이슈가 없어 3.1 타깃을 안정적으로 빌드/테스트한다.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core 3.1
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'

      - name: Restore
        run: dotnet restore MTM.sln

      - name: Build
        run: dotnet build MTM.sln -c Release --no-restore

      - name: Test
        run: dotnet test MTM.sln -c Release --no-build --verbosity normal

      - name: Run simulation (smoke)
        run: dotnet run -c Release --no-build --project src/MTM.Simulation/MTM.Simulation.csproj
