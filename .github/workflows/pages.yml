name: Deploy Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 진행 중인 프로덕션 배포는 끝까지 완료시킨다 (대기 중 최신 실행은 자동으로 이전 대기를 대체). GitHub 공식 Pages 권장값.
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site (only what the browser needs)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r design _site/
          cp -r docs _site/
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
